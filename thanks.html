<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — Maka Property</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1e1c1a;--paper:#f6f3ec;--accent:#b0664a;--accent-dark:#96543b;--ink-soft:#4a4642}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
  .mark{width:64px;height:64px;margin:0 auto 22px}
  .mark path,.mark rect{stroke:var(--ink)}
  h1{font-family:'Montserrat',sans-serif;font-size:2rem;margin-bottom:14px}
  p{color:var(--ink-soft);max-width:460px;margin:0 auto 28px;line-height:1.6}
  a.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:600;padding:13px 28px;border-radius:6px}
  a.btn:hover{background:var(--accent-dark)}
  .brand{font-family:'Montserrat',sans-serif;letter-spacing:.24em;font-weight:700;margin-bottom:6px}
  .brand small{display:block;font-weight:500;font-size:.6rem;letter-spacing:.44em;margin-top:5px;color:var(--ink-soft)}
</style>
</head>
<body>
  <div>
    <svg class="mark" viewBox="0 0 100 100" fill="none"><g stroke-width="7" stroke-linejoin="round" stroke-linecap="round"><path d="M18 88 V44 L50 20 L82 44 V88 Z"/><rect x="40" y="40" width="20" height="20"/><path d="M50 40 V60 M40 50 H60"/></g></svg>
    <div class="brand">MAKA<small>PROPERTY</small></div>
    <h1>Thank you — we've got your enquiry.</h1>
    <p>Kia ora, and thanks for getting in touch. We'll check availability and get back to you directly, usually within a few hours.</p>
    <a class="btn" href="/">Back to the homepage</a>
  </div>
</body>
</html>
